apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbcp-entry-service
  namespace: default
  labels:
    app.kubernetes.io/name: dbcp-entry-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dbcp-entry-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dbcp-entry-service
    spec:
      containers:
        - name: dbcp-entry-service
          image: dbcp-entry-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: gateway
              containerPort: 8081
            - name: tcp-backend
              containerPort: 9000
          envFrom:
            - configMapRef:
                name: dbcp-entry-service-config
            - secretRef:
                name: dbcp-entry-service-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

