apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: usermanagementservices.dbcp.example.com
spec:
  group: dbcp.example.com
  scope: Namespaced
  names:
    plural: usermanagementservices
    singular: usermanagementservice
    kind: UserManagementService
    shortNames:
      - ums
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - targetDB
                - targetRedis
                - serviceExportPort
              properties:
                targetDB:
                  type: string
                  description: MySQL DSN used by the TCP backend.
                targetRedis:
                  type: string
                  description: Redis host:port used for session storage.
                serviceExportPort:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  description: Public HTTP port serving the login page.
      additionalPrinterColumns:
        - name: Port
          type: integer
          jsonPath: .spec.serviceExportPort
        - name: DB
          type: string
          jsonPath: .spec.targetDB
        - name: Redis
          type: string
          jsonPath: .spec.targetRedis

